<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            display: inline-block;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #2563eb;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 0.6rem 1.8rem;
            margin-bottom: 2rem;
        }

        footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.6;
        }

        footer a {
            color: #6b7280;
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            color: #2563eb;
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-wrap .tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: #1f2937;
            color: #f3f4f6;
            font-size: 0.7rem;
            font-weight: 400;
            line-height: 1.5;
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            width: 240px;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
        }

        .tooltip-wrap .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1f2937;
        }

        .tooltip-wrap:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            min-height: 1.75rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.ready { background: #9ca3af; }
        .status-dot.recording { background: #22c55e; animation: pulse 1s infinite; }
        .status-dot.playing { background: #3b82f6; animation: pulse 1s infinite; }
        .status-dot.error { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-talk {
            width: 100%;
            padding: 1.25rem 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: background 0.15s, transform 0.1s;
            background: #2563eb;
            color: #fff;
        }

        .btn-talk:active:not(:disabled),
        .btn-talk.recording {
            background: #22c55e;
            transform: scale(0.97);
        }

        .btn-talk:disabled {
            background: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .btn-hint {
            display: block;
            margin-top: 0.35rem;
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .timer {
            margin-top: 1.5rem;
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
            min-height: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .timer-label {
            font-size: 0.85rem;
            font-weight: 400;
            color: #6b7280;
        }

        .timer.warning {
            color: #ef4444;
        }

        .error-msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #991b1b;
            font-size: 0.9rem;
            display: none;
        }

        .mic-controls {
            margin-bottom: 1rem;
        }

        .mic-bar {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-group {
            display: inline-flex;
            align-items: center;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }

        .btn-mute,
        .btn-mic-toggle {
            width: 32px;
            height: 30px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 0;
            background: transparent;
            cursor: pointer;
            color: #9ca3af;
            transition: background 0.15s, color 0.15s;
            padding: 0;
        }

        .btn-mute {
            border-right: 1px solid #e5e7eb;
        }

        .btn-mute:hover,
        .btn-mic-toggle:hover {
            background: #f9fafb;
            color: #6b7280;
        }

        .btn-mute.muted {
            color: #ef4444;
        }

        .btn-mute.muted:hover {
            background: #fef2f2;
        }

        .btn-mic-toggle svg {
            transition: transform 0.2s;
        }

        .btn-mic-toggle.open {
            color: #6b7280;
        }

        .btn-mic-toggle.open svg {
            transform: rotate(180deg);
        }

        .mic-select-wrap {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.2s ease, opacity 0.15s ease, margin-top 0.2s ease;
            margin-top: 0;
        }

        .mic-select-wrap.open {
            max-height: 60px;
            opacity: 1;
            margin-top: 0.5rem;
        }

        .mic-select {
            width: 100%;
            padding: 0.4rem 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #374151;
            background: #fff;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .mic-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .mic-select:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="app-title">Área A</h1>

        <div class="status">
            <span class="status-dot ready" id="status-dot"></span>
            <span id="status-text">A inicializar microfone...</span>
        </div>

        <div class="mic-controls">
            <div class="mic-bar">
                <div class="mic-group">
                    <button id="btn-mute" class="btn-mute" title="Silenciar microfone (M)">
                        <svg id="mute-icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                            <line x1="1" y1="1" x2="23" y2="23"/>
                            <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                            <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .67-.1 1.32-.27 1.93"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                        <svg id="mute-icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <button id="btn-mic-toggle" class="btn-mic-toggle" title="Selecionar microfone">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="mic-select-wrap" id="mic-select-wrap">
                <select id="mic-select" class="mic-select">
                    <option value="">A carregar...</option>
                </select>
            </div>
        </div>

        <button class="btn-talk" id="btn-talk" disabled>
            Manter premido para falar
            <span class="btn-hint">ou manter Espaço premido</span>
        </button>

        <div class="timer" id="timer"></div>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <footer>
        <span class="tooltip-wrap">
            <a href="https://github.com/mglraimundo/stentor" target="_blank">Stentor</a>
            <span class="tooltip">In Greek mythology, Stentor was a herald during the Trojan War whose voice was as powerful as fifty men.</span>
        </span><br>
        Desenvolvido por Miguel Raimundo
    </footer>

    <script>
    (function () {
        // --- Config ---
        var config = {
            app_name: "Área A",
            favicon_letter: "A",
            favicon_bg_color: "#2563EB",
            favicon_text_color: "#FFFFFF",
            max_recording_seconds: 20,
        };

        // --- DOM ---
        var appTitle = document.getElementById("app-title");
        var statusDot = document.getElementById("status-dot");
        var statusText = document.getElementById("status-text");
        var btnTalk = document.getElementById("btn-talk");
        var timerEl = document.getElementById("timer");
        var errorMsg = document.getElementById("error-msg");
        var micSelect = document.getElementById("mic-select");
        var micSelectWrap = document.getElementById("mic-select-wrap");
        var btnMute = document.getElementById("btn-mute");
        var btnMicToggle = document.getElementById("btn-mic-toggle");
        var muteIconOn = document.getElementById("mute-icon-on");
        var muteIconOff = document.getElementById("mute-icon-off");

        // --- State ---
        var mediaStream = null;
        var mediaRecorder = null;
        var recordedChunks = [];
        var isRecording = false;
        var countdownInterval = null;
        var secondsRemaining = 0;
        var lastReleaseTime = 0;
        var spaceHeld = false;
        var mouseHeld = false;
        var selectedDeviceId = null;
        var isMuted = false;
        var recordingTimeout = null;
        var wakeLock = null;
        var DEBOUNCE_MS = 500;

        // --- Demo State (Client-Side Audio Queue) ---
        var playQueue = [];
        var isPlaying = false;
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- Init UI ---
        document.title = config.app_name + " | Stentor";
        appTitle.textContent = config.app_name;

        // --- Chime Synthesizer ---
        function playBellPartial(freq, amp, startTime, decayTime) {
            var osc = audioCtx.createOscillator();
            var env = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            env.gain.setValueAtTime(0, startTime);
            env.gain.linearRampToValueAtTime(amp, startTime + 0.003);
            env.gain.exponentialRampToValueAtTime(0.0001, startTime + decayTime);
            osc.connect(env);
            env.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + decayTime + 0.01);
        }

        function playChime() {
            return new Promise(function(resolve) {
                if (audioCtx.state === 'suspended') audioCtx.resume();

                var now = audioCtx.currentTime;
                var freqs = [523.25, 659.25, 784.00]; // C5, E5, G5 — ascending major triad
                var spacing = 0.22;   // seconds between note onsets
                var decay = 1.2;      // bell ring-out per note

                freqs.forEach(function(freq, i) {
                    var t = now + i * spacing;
                    playBellPartial(freq,        0.44, t, decay);        // fundamental
                    playBellPartial(freq * 2,    0.14, t, decay * 0.55); // octave partial
                    playBellPartial(freq * 2.76, 0.10, t, decay * 0.35); // inharmonic bell partial
                });

                var total = spacing * (freqs.length - 1) + decay;
                setTimeout(resolve, total * 1000 + 200);
            });
        }

        // --- Local Playback Processor ---
        async function processQueue() {
            if (isPlaying || playQueue.length === 0) return;
            isPlaying = true;

            setStatus("playing", "A reproduzir áudio...");
            var blob = playQueue.shift();

            await playChime();

            try {
                // Use AudioContext for playback — avoids iOS autoplay restrictions
                // and unreliable HTMLAudioElement.onended on blob URLs
                var arrayBuffer = await blob.arrayBuffer();
                var audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                await new Promise(function(resolve) {
                    var source = audioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    var voiceGain = audioCtx.createGain();
                    voiceGain.gain.value = 2.0;
                    source.connect(voiceGain);
                    voiceGain.connect(audioCtx.destination);
                    source.onended = resolve;
                    source.start();
                });
            } catch (e) {
                console.warn("AudioContext playback failed, falling back to Audio element", e);
                var audioUrl = URL.createObjectURL(blob);
                await new Promise(function(resolve) {
                    var audio = new Audio(audioUrl);
                    var done = false;
                    function finish() {
                        if (done) return;
                        done = true;
                        URL.revokeObjectURL(audioUrl);
                        resolve();
                    }
                    audio.onended = finish;
                    audio.onerror = finish;
                    audio.play().catch(finish);
                });
            }

            isPlaying = false;

            if (!isRecording && playQueue.length === 0) {
                setStatus("ready", "Pronto");
            } else if (!isRecording && playQueue.length > 0) {
                setStatus("ready", "Na fila (" + playQueue.length + ")");
            }

            setTimeout(processQueue, 2000);
        }

        // --- UI helpers ---
        function setStatus(state, text) {
            statusDot.className = "status-dot " + state;
            statusText.textContent = text;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }

        function hideError() {
            errorMsg.style.display = "none";
        }

        function updateTimer() {
            if (!isRecording) {
                timerEl.innerHTML = "";
                timerEl.classList.remove("warning");
                return;
            }
            var warn = secondsRemaining <= 5;
            timerEl.classList.toggle("warning", warn);
            timerEl.innerHTML =
                '<span class="timer-label">' + (warn ? "A terminar..." : "Tempo restante") + '</span>' +
                '<span>' + secondsRemaining + 's</span>';
        }

        function startCountdown(seconds) {
            stopCountdown();
            secondsRemaining = seconds;
            updateTimer();
            countdownInterval = setInterval(function () {
                secondsRemaining = Math.max(0, secondsRemaining - 1);
                updateTimer();
            }, 1000);
        }

        function stopCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            timerEl.innerHTML = "";
            timerEl.classList.remove("warning");
        }

        // --- Microphone ---
        async function ensureMicrophone(deviceId) {
            if (mediaStream && !deviceId) return true;
            if (deviceId && mediaStream) {
                mediaStream.getTracks().forEach(function (t) { t.stop(); });
                mediaStream = null;
            }
            try {
                var audioConstraints = {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    channelCount: 1,
                    sampleRate: 48000,
                };
                if (deviceId) {
                    audioConstraints.deviceId = { exact: deviceId };
                }
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: audioConstraints
                });
                mediaStream.getAudioTracks().forEach(function (t) {
                    t.enabled = !isMuted;
                });
                return true;
            } catch (e) {
                showError("Permissão de microfone negada. Verifique as definições do navegador.");
                btnTalk.disabled = true;
                return false;
            }
        }

        async function populateMicList() {
            try {
                var devices = await navigator.mediaDevices.enumerateDevices();
                var mics = devices.filter(function (d) { return d.kind === "audioinput"; });

                if (mics.length === 0) {
                    micSelect.innerHTML = '<option value="">Nenhum microfone encontrado</option>';
                    micSelect.disabled = true;
                    return;
                }

                micSelect.disabled = false;
                micSelect.innerHTML = "";
                mics.forEach(function (mic, i) {
                    var opt = document.createElement("option");
                    opt.value = mic.deviceId;
                    opt.textContent = mic.label || ("Microfone " + (i + 1));
                    micSelect.appendChild(opt);
                });

                var saved = localStorage.getItem("stentor_mic_device_id");
                if (saved && mics.some(function (m) { return m.deviceId === saved; })) {
                    micSelect.value = saved;
                    selectedDeviceId = saved;
                } else {
                    selectedDeviceId = mics[0].deviceId;
                    micSelect.value = selectedDeviceId;
                }
            } catch (e) {
                console.warn("Failed to enumerate devices", e);
            }
        }

        async function switchMicrophone(deviceId) {
            selectedDeviceId = deviceId;
            localStorage.setItem("stentor_mic_device_id", deviceId);

            if (isRecording) {
                stopRecordingSession();
            }
            await ensureMicrophone(deviceId);
        }

        function toggleMute() {
            isMuted = !isMuted;
            if (mediaStream) {
                mediaStream.getAudioTracks().forEach(function (t) {
                    t.enabled = !isMuted;
                });
            }
            btnMute.classList.toggle("muted", isMuted);
            muteIconOn.style.display = isMuted ? "block" : "none";
            muteIconOff.style.display = isMuted ? "none" : "block";
            updateTalkButtonState();
        }

        function updateTalkButtonState() {
            if (isMuted) {
                btnTalk.innerHTML = 'Microfone silenciado<span class="btn-hint">clique no botão de silenciar para reativar</span>';
                btnTalk.disabled = true;
            } else {
                btnTalk.innerHTML = 'Manter premido para falar<span class="btn-hint">ou manter Espaço premido</span>';
                btnTalk.disabled = !mediaStream;
            }
        }

        // --- Recording ---
        function startMediaRecorder() {
            if (!mediaStream) return;
            recordedChunks = [];
            try {
                mediaRecorder = new MediaRecorder(mediaStream, {
                    mimeType: "audio/webm;codecs=opus",
                    audioBitsPerSecond: 96000,
                });
            } catch (e) {
                mediaRecorder = new MediaRecorder(mediaStream);
            }
            mediaRecorder.ondataavailable = function (event) {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            mediaRecorder.onstop = function () {
                var chunks = recordedChunks;
                recordedChunks = [];
                if (chunks.length > 0) {
                    var blob = new Blob(chunks, { type: "audio/webm;codecs=opus" });
                    playQueue.push(blob);
                    processQueue(); // Queue audio for local playback
                }
            };
            mediaRecorder.start();
        }

        function stopMediaRecorder() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                try { mediaRecorder.stop(); } catch (e) {}
            }
            mediaRecorder = null;
        }

        // --- Recording session ---
        function startRecordingSession() {
            if (isMuted) return;
            if (isRecording) return;
            if (Date.now() - lastReleaseTime < DEBOUNCE_MS) return;
            if (!mediaStream) return;

            // Initialize AudioContext if not running (browser policy requirement on first interaction)
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isRecording = true;
            btnTalk.classList.add("recording");
            setStatus("recording", "A gravar");
            if (navigator.vibrate) navigator.vibrate(30);
            hideError();
            startCountdown(config.max_recording_seconds);
            startMediaRecorder();

            // Auto-stop at max duration
            recordingTimeout = setTimeout(function () {
                recordingTimeout = null;
                stopRecordingSession();
            }, config.max_recording_seconds * 1000);
        }

        function stopRecordingSession() {
            lastReleaseTime = Date.now();
            if (!isRecording) return;

            isRecording = false;
            btnTalk.classList.remove("recording");
            stopCountdown();

            if (recordingTimeout) {
                clearTimeout(recordingTimeout);
                recordingTimeout = null;
            }

            if (navigator.vibrate) navigator.vibrate([15, 30, 15]);
            stopMediaRecorder(); // triggers onstop -> enqueues audio

            if (!isPlaying) {
                setStatus("ready", "A processar...");
            }
        }

        // --- Input handlers ---
        function isInputFocused() {
            var tag = document.activeElement && document.activeElement.tagName;
            return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
        }

        // Mouse / touch
        btnTalk.addEventListener("mousedown", function (e) {
            e.preventDefault();
            mouseHeld = true;
            startRecordingSession();
        });

        btnTalk.addEventListener("touchstart", function (e) {
            e.preventDefault();
            mouseHeld = true;
            startRecordingSession();
        }, { passive: false });

        function onPointerRelease() {
            if (mouseHeld) {
                mouseHeld = false;
                stopRecordingSession();
            }
        }

        document.addEventListener("mouseup", onPointerRelease);
        document.addEventListener("touchend", onPointerRelease);
        btnTalk.addEventListener("mouseleave", function () {
            if (mouseHeld) {
                mouseHeld = false;
                stopRecordingSession();
            }
        });

        // Prevent long-press context menu on mobile
        btnTalk.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });

        // Keyboard (Space + M)
        document.addEventListener("keydown", function (e) {
            if (isInputFocused()) return;
            if (e.code === "Space" && !e.repeat) {
                e.preventDefault();
                if (!spaceHeld) {
                    spaceHeld = true;
                    startRecordingSession();
                }
            } else if (e.code === "KeyM" && !e.repeat) {
                toggleMute();
            }
        });

        document.addEventListener("keyup", function (e) {
            if (e.code !== "Space" || isInputFocused()) return;
            e.preventDefault();
            if (spaceHeld) {
                spaceHeld = false;
                stopRecordingSession();
            }
        });

        // Mic select / mute / device change
        micSelect.addEventListener("change", function () {
            switchMicrophone(micSelect.value);
            micSelectWrap.classList.remove("open");
            btnMicToggle.classList.remove("open");
            micSelect.blur();
        });

        btnMicToggle.addEventListener("click", function () {
            var isOpen = micSelectWrap.classList.toggle("open");
            btnMicToggle.classList.toggle("open", isOpen);
            btnMicToggle.blur();
        });

        btnMute.addEventListener("click", function () {
            toggleMute();
            btnMute.blur();
        });

        navigator.mediaDevices.addEventListener("devicechange", async function () {
            var previousId = selectedDeviceId;
            await populateMicList();
            if (previousId && previousId !== selectedDeviceId) {
                var selectedLabel = micSelect.options[micSelect.selectedIndex]
                    ? micSelect.options[micSelect.selectedIndex].textContent
                    : "predefinido";
                showError("Microfone desligado. A usar: " + selectedLabel);
                setTimeout(hideError, 4000);
                await switchMicrophone(selectedDeviceId);
            }
        });

        // --- Wake Lock (prevent screen sleep on mobile) ---
        async function requestWakeLock() {
            if (!("wakeLock" in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request("screen");
                wakeLock.addEventListener("release", function () { wakeLock = null; });
            } catch (e) {}
        }

        document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "visible" && !wakeLock) {
                requestWakeLock();
            }
        });

        // --- Init ---
        async function init() {
            var saved = localStorage.getItem("stentor_mic_device_id");
            var hasMic = await ensureMicrophone(saved || undefined);
            
            if (hasMic) {
                setStatus("ready", "Pronto");
            }
            
            await populateMicList();
            if (selectedDeviceId && selectedDeviceId !== (mediaStream && mediaStream.getAudioTracks()[0] && mediaStream.getAudioTracks()[0].getSettings().deviceId)) {
                await ensureMicrophone(selectedDeviceId);
            }
            updateTalkButtonState();
            requestWakeLock();
        }

        init();
    })();
    </script>
</body>
